<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Realizado</title>
    <style>
        /* Estilos para centralizar o conteúdo na tela toda */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4; /* Mantendo a cor de fundo solicitada */
            
            /* Flexbox para centralização perfeita */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* Ocupa 100% da altura da tela */
            text-align: center;
        }

        /* Estilos para o contêiner da mensagem */
        .container {
            width: 400px;
            padding: 40px;
            border: 1px solid #ccc;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Estilo do título de sucesso */
        h1 {
            margin: 0;
            color: #28a745; /* Cor verde para remeter a sucesso */
            font-size: 24px;
        }

        /* Botão opcional para voltar */
        .btn-voltar {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #007bff;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            font-size: 14px;
        }

        .btn-voltar:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="container">
        <div style="font-size: 50px; margin-bottom: 10px;">✅</div>
        
        <h1>CADASTRO REALIZADO COM SUCESSO</h1>
        
        <a href="index.html" class="btn-voltar">Voltar ao Início</a>
    </div>

</body>
</html>
