<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro do Aluno</title>
    <style>
        /* Estilos básicos para o corpo da página */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
            background-color: #f4f4f4;
        }

        /* Estilos para o título do formulário */
        h1 {
            margin-bottom: 20px;
        }

        /* Estilos para o contêiner do formulário */
        form {
            width: 300px;
            padding: 20px;
            border: 1px solid #ccc;
            background-color: #fff;
            border-radius: 5px;
            margin: 0 auto;
        }

        /* Estilos para rótulos de campos */
        label {
            display: block;
            margin-bottom: 5px;
            text-align: left;
        }

        /* Corrigido: Estilos para todos os campos de entrada de texto */
        input:not([type="submit"]) {
            width: calc(100% - 20px);
            padding: 8px;
            margin-bottom: 15px; /* Espaço entre campos */
            border: 1px solid #ccc;
            border-radius: 3px;
            display: block;
        }

        /* Estilos para o botão de envio com o espaço de 30px */
        input[type="submit"] {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            margin-top: 30px; /* Comando de afastamento solicitado */
            font-weight: bold;
        }

        /* Efeito hover no botão */
        input[type="submit"]:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Cadastro do Aluno</h1>
        
        <form action="cadastro_realizado.html" method="get">
            
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" required>

            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" required>

            <label for="telefone">Telefone:</label>
            <input type="tel" id="telefone" name="telefone" required>

            <label for="cpf">CPF:</label>
            <input type="text" id="cpf" name="cpf" required>

            <label for="endereco">Endereço:</label>
            <input type="text" id="endereco" name="endereco" required>

            <label for="bairro">Bairro:</label>
            <input type="text" id="bairro" name="bairro" required>

            <label for="cidade">Cidade:</label>
            <input type="text" id="cidade" name="cidade" required>

            <label for="uf">UF:</label>
            <input type="text" id="uf" name="uf" maxlength="2" required>

            <label for="cep">CEP:</label>
            <input type="text" id="cep" name="cep" required>

            <input type="submit" value="Enviar">
        </form>
    </div>
</body>
</html>
